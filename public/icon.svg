<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2d95"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="14" fill="#0d0a1a"/>
  <rect x="4.6" y="4.6" width="54.8" height="54.8" rx="13.4" fill="none" stroke="url(#g)" stroke-width="1.6" opacity="0.85"/>
  <!-- palm silhouette -->
  <path d="M14 50c4-3 6-6 6-12" stroke="#22d3ee" stroke-width="1.4" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M14 50c-2-1-3-3-3-5M14 50c2-1 4-2 5-4M14 50c0-2 1-4 2-6" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.6" stroke-linecap="round"/>
  <!-- sun -->
  <circle cx="48" cy="18" r="6" fill="url(#g)" opacity="0.85"/>
  <!-- VI -->
  <text x="32" y="44" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="26" fill="url(#g)" filter="url(#glow)">VI</text>
</svg>
